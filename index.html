<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a14">
<title>Mes Francs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f0;--surface:#fff;--surface2:#f0ede6;--border:#e2ddd4;
  --text:#1a1a14;--text2:#6b6757;--text3:#aaa590;
  --gold:#b8860b;--gold-light:#f5e9c0;--gold-mid:#e6c96a;
  --green:#2d5a10;--green-bg:#e8f2dc;
  --blue:#1a4f8a;--blue-bg:#deeaf8;
  --amber:#7a4500;--amber-bg:#f5e2c0;
  --red:#8a1a1a;--red-bg:#f5dcdc;
  --r:12px;--rl:16px;--rxl:20px;
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);overscroll-behavior:none}
.page{display:none;flex-direction:column;min-height:100vh;max-width:440px;margin:0 auto;animation:fadeIn 0.18s ease}
.page.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}

/* HERO */
.home-hero{background:var(--text);padding:28px 20px 24px;position:relative;overflow:hidden;flex-shrink:0}
.home-hero::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;border:32px solid rgba(184,134,11,0.15)}
.hero-label{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--gold-mid);text-transform:uppercase;margin-bottom:8px}
.hero-title{font-size:26px;font-weight:700;color:#fff;line-height:1.2;letter-spacing:-0.5px;margin-bottom:6px}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:20px}
.hero-stats{display:flex;gap:24px}
.hero-stat-n{font-size:22px;font-weight:700;color:var(--gold-mid);line-height:1}
.hero-stat-l{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}

.section-title{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding:16px 16px 8px;flex-shrink:0}
.family-grid{padding:0 12px 24px;display:flex;flex-direction:column;gap:12px}
.family-card{border-radius:var(--rl);overflow:hidden;cursor:pointer;display:flex;align-items:center;padding:20px 18px;gap:16px;transition:all 0.15s;position:relative}
.family-card:active{opacity:0.85;transform:scale(0.99)}
.family-card-icon{font-size:32px;flex-shrink:0}
.family-card-body{flex:1;min-width:0}
.family-card-name{font-size:18px;font-weight:700;color:#fff;margin-bottom:3px}
.family-card-sub{font-size:12px;color:rgba(255,255,255,0.6)}
.family-card-count{font-size:13px;font-weight:600;color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.15);padding:4px 12px;border-radius:20px;flex-shrink:0}
.family-chevron{color:rgba(255,255,255,0.5);font-size:22px;flex-shrink:0}
.import-bar{display:flex;gap:8px;padding:14px 16px 0;flex-shrink:0}
.import-btn{flex:1;background:var(--gold);color:#1a1a14;border:none;border-radius:var(--r);padding:11px 12px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.import-btn svg{width:15px;height:15px;flex-shrink:0}
.import-btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:var(--r);padding:11px 12px;font-size:12px;cursor:pointer;white-space:nowrap}
.import-summary{margin:0 16px 4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--text2);line-height:1.6}
.import-summary b{color:var(--text)}
.import-summary.error{background:var(--red-bg);border-color:transparent;color:var(--red)}

/* PERIOD CARDS */
.period-list{padding:0 12px 24px;display:flex;flex-direction:column;gap:8px}
.period-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;cursor:pointer;display:flex;align-items:stretch;transition:all 0.15s}
.period-card:active{opacity:0.8;transform:scale(0.99)}
.period-stripe{width:5px;flex-shrink:0}
.period-body{flex:1;padding:13px 14px;min-width:0}
.period-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px}
.period-years{font-size:12px;color:var(--text3)}
.period-right{padding:13px 14px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:4px;flex-shrink:0}
.count-pill{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
.count-pill.has{background:var(--gold-light);color:var(--gold)}
.count-pill.empty{background:var(--surface2);color:var(--text3)}
.chevron{color:var(--text3);font-size:18px;line-height:1}

/* PAGE HEADER */
.page-header{padding:14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;flex-shrink:0}
.back-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.1);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.page-header-body{flex:1;min-width:0}
.page-header-title{font-size:16px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page-header-sub{font-size:12px;color:rgba(255,255,255,0.45);margin-top:1px}
.header-add-btn{background:var(--gold);color:#1a1a14;border:none;border-radius:var(--r);padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* INFO BOX */
.info-box{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 16px;flex-shrink:0}
.info-desc{font-size:13px;color:var(--text2);line-height:1.5}
.mini-stats{display:flex;margin-top:12px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.mini-stat{flex:1;padding:9px;text-align:center;border-right:1px solid var(--border)}
.mini-stat:last-child{border-right:none}
.mini-stat-n{font-size:18px;font-weight:700;color:var(--text)}
.mini-stat-l{font-size:10px;color:var(--text3);margin-top:1px;text-transform:uppercase;letter-spacing:0.5px}

/* TYPE LIST (page période) — disposition horizontale */
.type-grid{padding:10px 12px 24px;display:flex;flex-direction:column;gap:8px}
.type-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;cursor:pointer;display:flex;flex-direction:row;align-items:stretch;transition:all 0.15s;position:relative}
.type-card:active{opacity:0.8;transform:scale(0.98)}
.type-photo{width:150px;height:80px;flex-shrink:0;overflow:hidden;background:var(--surface2);position:relative;display:flex;align-items:center;justify-content:center}
.type-photo img{width:100%;height:100%;object-fit:cover}
.type-photo-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;width:100%;height:100%;cursor:pointer}
.type-photo-placeholder svg{width:20px;height:20px;opacity:0.3}
.type-photo-placeholder span{font-size:9px;color:var(--text3);text-align:center;padding:0 4px;line-height:1.3}
.type-photo-add{position:absolute;bottom:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.45);border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.type-info{flex:1;padding:12px 14px;min-width:0;display:flex;flex-direction:column;justify-content:center}
.type-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.3}
.type-sub{font-size:11px;color:var(--text3);margin-bottom:6px}
.type-count{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-block}
.type-count.has{background:var(--gold-light);color:var(--gold)}
.type-count.empty{background:var(--surface2);color:var(--text3)}
.type-chevron{padding:0 12px;display:flex;align-items:center;color:var(--text3);font-size:18px;flex-shrink:0}

/* COIN LIST (page type) */
.coin-list{padding:10px 12px 24px;display:flex;flex-direction:column;gap:8px}
.coin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:all 0.15s}
.coin-card:active{opacity:0.8}
.coin-body{padding:13px 14px}
.coin-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:8px}
.coin-name{font-size:14px;font-weight:600;color:var(--text);flex:1;min-width:0}
.coin-details{font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:3px}
.coin-tag{font-size:11px;color:var(--gold);font-weight:500;margin-top:3px}
.coin-notes{font-size:11px;color:var(--text3);margin-top:3px;font-style:italic}
.badge{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:700}
.badge-SPL{background:var(--green-bg);color:var(--green)}
.badge-SUP{background:var(--blue-bg);color:var(--blue)}
.badge-TB{background:var(--amber-bg);color:var(--amber)}
.badge-B{background:var(--red-bg);color:var(--red)}

.empty{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);display:flex;align-items:center;gap:12px;padding:12px 14px;margin:0 12px}
.empty-icon{font-size:24px;flex-shrink:0}.empty-body{flex:1;min-width:0}
.empty-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:2px}
.empty-sub{font-size:11px;color:var(--text3);line-height:1.4}
.empty-btn{flex-shrink:0;background:var(--gold);color:#1a1a14;border:none;border-radius:var(--r);padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:var(--surface);border-radius:var(--rxl) var(--rxl) 0 0;width:100%;max-width:440px;max-height:94vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.modal-inner{padding:16px 16px 40px}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700;color:var(--text)}
.close-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.photo-zone{border:1.5px dashed var(--border);border-radius:var(--rl);height:150px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:12px;overflow:hidden;position:relative;background:var(--surface2)}
.photo-zone img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.photo-hint{display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.photo-hint-icon{font-size:28px}
.photo-hint span{font-size:12px;color:var(--text3)}
.photo-actions{display:flex;gap:8px;margin-bottom:14px}
.photo-btn{flex:1;padding:8px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;text-align:center}
.photo-btn-del{background:var(--red-bg);color:var(--red);border-color:transparent}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-group{margin-bottom:12px}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
input[type=text],input[type=number],select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--surface);color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
textarea{resize:none;height:60px;line-height:1.4}
.etat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.etat-opt{padding:9px 4px;text-align:center;border:1px solid var(--border);border-radius:var(--r);font-size:12px;cursor:pointer;color:var(--text2);line-height:1.3;background:var(--surface2)}
.etat-opt.sel{border-color:var(--gold);background:var(--gold-light);color:var(--gold);font-weight:700}
.etat-opt small{font-size:10px;opacity:0.7;display:block}
.form-section-title{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.btn-cancel{padding:11px;border:1px solid var(--border);border-radius:var(--r);background:transparent;color:var(--text2);font-size:14px;cursor:pointer}
.btn-save{padding:11px;border:none;border-radius:var(--r);background:var(--gold);color:#1a1a14;font-size:14px;font-weight:700;cursor:pointer}
.btn-delete{padding:11px;border:1px solid var(--red-bg);border-radius:var(--r);background:transparent;color:var(--red);font-size:14px;cursor:pointer;grid-column:1/-1;margin-top:4px}
</style>
</head>
<body>

<!-- PAGE 1 : ACCUEIL -->
<div class="page active" id="page-home">
  <div class="home-hero">
    <div class="hero-label">Collection numismatique</div>
    <div class="hero-title">Mes Monnaies<br>Françaises</div>
    <div class="hero-sub">Choisissez une grande famille</div>
    <div class="hero-stats">
      <div><div class="hero-stat-n" id="home-total">0</div><div class="hero-stat-l">pièces au total</div></div>
      <div><div class="hero-stat-n" id="home-periods">0</div><div class="hero-stat-l">périodes représentées</div></div>
    </div>
  </div>
  <div class="import-bar">
    <button class="import-btn" onclick="document.getElementById('csvFileInput').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Importer CSV
    </button>
    <button class="import-btn-secondary" onclick="downloadTemplate()">Modèle CSV</button>
    <input type="file" id="csvFileInput" accept=".csv" style="display:none" onchange="handleCsvImport(event)">
  </div>
  <div class="section-title">Familles de monnaies</div>
  <div class="family-grid" id="familyGrid"></div>
</div>

<!-- PAGE 1b : SECTION (Royales ou Républicaines) -->
<div class="page" id="page-section">
  <div class="page-header" id="section-header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <div class="page-header-body">
      <div class="page-header-title" id="section-title"></div>
      <div class="page-header-sub" id="section-sub"></div>
    </div>
  </div>
  <div class="period-list" id="sectionPeriodList"></div>
</div>

<!-- PAGE 2 : PÉRIODE -->
<div class="page" id="page-period">
  <div class="page-header" id="period-header">
    <button class="back-btn" onclick="goSection()">‹</button>
    <div class="page-header-body">
      <div class="page-header-title" id="period-title"></div>
      <div class="page-header-sub" id="period-years"></div>
    </div>
  </div>
  <div class="info-box">
    <div class="info-desc" id="period-desc"></div>
    <div class="mini-stats" id="period-stats"></div>
  </div>
  <div class="section-title">Types de pièces</div>
  <div class="type-grid" id="typeGrid"></div>
</div>

<!-- PAGE 3 : COLLECTION PAR TYPE -->
<div class="page" id="page-coins">
  <div class="page-header" id="coins-header">
    <button class="back-btn" onclick="goPeriodBack()">‹</button>
    <div class="page-header-body">
      <div class="page-header-title" id="coins-title"></div>
      <div class="page-header-sub" id="coins-sub"></div>
    </div>
    <button class="header-add-btn" onclick="openModal()">+ Ajouter</button>
  </div>
  <div class="info-box">
    <div class="info-desc" id="coins-desc"></div>
    <div class="mini-stats" id="coins-stats"></div>
  </div>
  <div class="coin-list" id="coinList"></div>
</div>

<!-- MODAL PIÈCE -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="handleOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-inner">
      <div class="modal-hdr">
        <div class="modal-title" id="modalTitle">Nouvelle pièce</div>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>

      <div class="form-section-title">Frappe</div>
      <div class="form-row">
        <div class="form-group"><label>Année de frappe</label><input type="number" id="fYear" placeholder="1898" min="1600" max="2001"></div>
        <div class="form-group"><label>Quantité frappée</label><input type="text" id="fTirage" placeholder="ex: 5 200 000"></div>
      </div>

      <div class="form-section-title">Ma pièce</div>
      <div class="form-group">
        <label>État de conservation</label>
        <div class="etat-grid">
          <div class="etat-opt" onclick="selEtat('B')">B<small>Beau</small></div>
          <div class="etat-opt" onclick="selEtat('TB')">TB<small>Très beau</small></div>
          <div class="etat-opt" onclick="selEtat('SUP')">SUP<small>Superbe</small></div>
          <div class="etat-opt" onclick="selEtat('SPL')">SPL<small>Splendide</small></div>
        </div>
      </div>
      <div class="form-group"><label>Variantes</label><textarea id="fVariantes" placeholder="ex: tranche B, différent corne, étoile..."></textarea></div>
      <div class="form-group"><label>Notes</label><textarea id="fNotes" placeholder="Provenance, prix payé, observations..."></textarea></div>

      <div class="btn-row" id="btnRow">
        <button class="btn-cancel" onclick="closeModal()">Annuler</button>
        <button class="btn-save" onclick="saveCoin()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<!-- INPUT CACHÉ POUR PHOTO DE RÉFÉRENCE -->
<input type="file" id="fileInputRef" accept="image/*" style="display:none" onchange="handleFile(event,'ref')">

<script>

function loadData() {

}

function coinsForType(tid)   { return coins.filter(c => c.typeId === tid); }
function coinsForPeriod(pid) { return coins.filter(c => c.periodId === pid); }
function getPeriod(pid)      { return PERIODS.find(p => p.id === pid); }
function getType(pid, tid)   { return getPeriod(pid).types.find(t => t.id === tid); }

function fmtTirage(s) {
  if (!s) return s;
  const cleaned = String(s).replace(/\s/g, '');
  if (/^-?\d+$/.test(cleaned)) {
    const num = parseInt(cleaned, 10);
    if (!isNaN(num)) return num.toLocaleString('fr-FR');
  }
  return s;
}

function fmtNum(n) {
  return Number(n).toLocaleString('fr-FR');
}

  document.getElementById('coins-title').textContent = t.name;
  document.getElementById('coins-sub').textContent = p.name + ' · ' + t.sub;
  const rows = [
    t.graveur  ? ['Graveur',  t.graveur]           : null,
    t.metal    ? ['Métal',    t.metal]              : null,
    t.poids    ? ['Poids',    t.poids + ' g']       : null,
    t.diametre ? ['Diamètre', t.diametre + ' mm']   : null,
    t.tranche  ? ['Tranche',  t.tranche]            : null,

    `<p style="font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:${rows.length?'10px':'0'}">${t.desc}</p>` +
    (rows.length ? `<table style="width:100%;border-collapse:collapse;font-size:12px">${
      rows.map((r,i) => `<tr style="background:${i%2===0?'var(--surface2)':'var(--surface)'}">
        <td style="padding:5px 10px;color:var(--text3);font-weight:600;width:40%;white-space:nowrap">${r[0]}</td>

  showPage('page-coins');

function renderCoinList(p, t) {
  if (!p) p = getPeriod(currentPeriodId);
  if (!t) t = getType(currentPeriodId, currentTypeId);
  const list = coinsForType(currentTypeId).sort((a,b) => a.year - b.year);
  const years = list.length ? [...new Set(list.map(c=>c.year))].length : 0;
  const top   = list.filter(c => c.etat==='SPL'||c.etat==='SUP').length;
  document.getElementById('coins-stats').innerHTML = `
    <div class="mini-stat"><div class="mini-stat-n">${fmtNum(list.length)}</div><div class="mini-stat-l">Pièces</div></div>
    <div class="mini-stat"><div class="mini-stat-n">${fmtNum(years)}</div><div class="mini-stat-l">Millésimes</div></div>
    <div class="mini-stat"><div class="mini-stat-n">${fmtNum(top)}</div><div class="mini-stat-l">SUP+SPL</div></div>`;
  const cl = document.getElementById('coinList');
  if (!list.length) {
    const ref = typeRefs[currentTypeId];
    cl.innerHTML = `<div class="empty">
      <div class="empty-icon">🪙</div>
      <div class="empty-body">
        <div class="empty-title">Aucune pièce dans votre collection</div>
        <div class="empty-sub">Type « ${t.name} »</div>
      </div>
      <button class="empty-btn" onclick="openModal()">+ Ajouter</button>

    return;
  }
  cl.innerHTML = list.map(c => {
    return `<div class="coin-card" onclick="openEdit(${c.id})">
      <div class="coin-body">
        <div class="coin-header-row">
          <div class="coin-name">${c.year}</div>
          <span class="badge badge-${c.etat}">${c.etat}</span>

        ${c.tirage    ? `<div class="coin-details">Quantité frappée : ${fmtTirage(c.tirage)}</div>` : ''}

        ${c.notes     ? `<div class="coin-notes">${c.notes}</div>`                        : ''}
      </div>
    </div>`;
  }).join('');
}

  document.querySelectorAll('.etat-opt').forEach((el,i) => el.classList.toggle('sel', ['B','TB','SUP','SPL'][i] === currentEtat));

    ? `<button class="btn-cancel" onclick="closeModal()">Annuler</button><button class="btn-save" onclick="saveCoin()">Enregistrer</button><button class="btn-delete" onclick="deleteCoin(${coin.id})">Supprimer</button>`

  document.body.style.overflow = 'hidden';
}
function openEdit(id)  { openModal(coins.find(c => c.id===id)); }

function triggerPhoto(target) {
  document.getElementById('fileInputRef').click();
}
function handleFile(evt, target) {
  const file = evt.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 700; let w=img.width, h=img.height;
      if (w>h && w>MAX) { h=Math.round(h*MAX/w); w=MAX; }
      else if (h>=w && h>MAX) { w=Math.round(w*MAX/h); h=MAX; }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const data = canvas.toDataURL('image/jpeg',0.78);
      typeRefs[refTargetTypeId] = data;
      saveRefs();
      renderTypeGrid(getPeriod(currentPeriodId));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file); evt.target.value='';
}

function deleteCoin(id) {
  if (!confirm('Supprimer cette pièce ?')) return;
  coins = coins.filter(c => c.id !== id);
  saveCoins(); closeModal(); renderCoinList();
}

function saveCoin() {
  const yr = parseInt(document.getElementById('fYear').value);
  if (!yr||yr<1600||yr>2001) { alert('Année invalide (1600–2001).'); return; }
  const t = getType(currentPeriodId, currentTypeId);
  const g = id => document.getElementById(id).value.trim();
  const d = {
    val:      t.name,
    year:     yr,
    periodId: currentPeriodId,
    typeId:   currentTypeId,
    tirage:   g('fTirage'),
    etat:     currentEtat||'TB',
    variantes:g('fVariantes'),
    notes:    g('fNotes'),
  };
  if (editId) { Object.assign(coins.find(c=>c.id===editId), d); }
  else        { coins.push({ id:Date.now(), ...d }); }
  saveCoins(); closeModal(); renderCoinList();
}

// IMPORT / EXPORT CSV
// ══════════════════════════════════════════
function csvEscape(s) {
  s = String(s ?? '');
  if (s.includes(',') || s.includes('"') || s.includes('\n')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function parseCsvLine(line) {
  const out = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) {
      if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (ch === '"') { inQ = false; }
      else { cur += ch; }
    } else {
      if (ch === '"') { inQ = true; }
      else if (ch === ',') { out.push(cur); cur = ''; }
      else { cur += ch; }
    }
  }
  out.push(cur);
  return out;
}

function downloadTemplate() {
  const header = ['periode_id','type_id','periode_nom','type_nom','atelier','annee','quantite_frappee','etat','variante','notes'];
  const rows = [header.join(',')];
  PERIODS.forEach(p => {
    p.types.forEach(t => {
      rows.push([p.id, t.id, p.name, t.name, '', '', '', '', ''].map(csvEscape).join(','));
    });
  });
  const csv = '\uFEFF' + rows.join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'modele_collection_mes_francs.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function handleCsvImport(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let text = e.target.result;
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // enlever BOM
      const lines = text.split(/\r\n|\n|\r/).filter(l => l.trim().length > 0);
      if (lines.length < 2) { showImportSummary('Le fichier est vide ou ne contient pas de données.', true); return; }

      const header = parseCsvLine(lines[0]).map(h => h.trim().toLowerCase());
      const idxPeriode  = header.indexOf('periode_id');
      const idxType     = header.indexOf('type_id');
      const idxAnnee    = header.indexOf('annee');
      const idxQte      = header.indexOf('quantite_frappee');
      const idxEtat     = header.indexOf('etat');
      const idxVariante = header.indexOf('variante');
      const idxNotes    = header.indexOf('notes');
      const idxAtelier  = header.indexOf('atelier');

      if (idxPeriode === -1 || idxType === -1 || idxAnnee === -1) {
        showImportSummary('Colonnes requises manquantes : periode_id, type_id, annee.', true);
        return;
      }

      let added = 0, skipped = 0, errors = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = parseCsvLine(lines[i]);
        const periodId = (cols[idxPeriode] || '').trim();
        const typeId   = (cols[idxType]    || '').trim();
        const anneeStr = (cols[idxAnnee]   || '').trim();
        if (!periodId || !typeId || !anneeStr) { skipped++; continue; }

        const p = getPeriod(periodId);
        if (!p) { errors.push(`Ligne ${i+1} : période inconnue "${periodId}"`); skipped++; continue; }
        const t = p.types.find(x => x.id === typeId);
        if (!t) { errors.push(`Ligne ${i+1} : type inconnu "${typeId}" dans "${periodId}"`); skipped++; continue; }

        const yr = parseInt(anneeStr);
        if (!yr || yr < 1600 || yr > 2001) { errors.push(`Ligne ${i+1} : année invalide "${anneeStr}"`); skipped++; continue; }

        let etat = (cols[idxEtat] || '').trim().toUpperCase();
        if (!['B','TB','SUP','SPL'].includes(etat)) etat = 'TB';

        coins.push({
          id: Date.now() + i,
          periodId, typeId,
          val: t.name,
          year: yr,
          tirage: idxQte !== -1 ? (cols[idxQte] || '').trim() : '',
          etat,
          variantes: idxVariante !== -1 ? (cols[idxVariante] || '').trim() : '',
          notes: idxNotes !== -1 ? (cols[idxNotes] || '').trim() : '',
        });
        added++;
      }

      saveCoins();
      renderHome();

      let msg = `<b>${added}</b> pièce${added>1?'s':''} importée${added>1?'s':''} avec succès.`;
      if (skipped > 0) msg += ` <b>${skipped}</b> ligne${skipped>1?'s':''} ignorée${skipped>1?'s':''}.`;
      if (errors.length) msg += '<br><br>' + errors.slice(0,8).join('<br>') + (errors.length>8 ? `<br>... et ${errors.length-8} autre(s)` : '');
      showImportSummary(msg, errors.length > 0 && added === 0);

    } catch (err) {
      showImportSummary("Erreur de lecture du fichier : " + err.message, true);
    }
  };
  reader.readAsText(file, 'UTF-8');
  evt.target.value = '';
}

function showImportSummary(html, isError) {
  let box = document.getElementById('importSummary');
  if (box) box.remove();
  box = document.createElement('div');
  box.id = 'importSummary';
  box.className = 'import-summary' + (isError ? ' error' : '');
  box.innerHTML = html;
  const bar = document.querySelector('.import-bar');
  bar.parentNode.insertBefore(box, bar.nextSibling);
}
